name: 'Deploy: Microservices on AKS'

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region'
        required: true
        default: 'australiaeast'
        type: choice
        options: [australiaeast, eastus, westus2, northeurope, westeurope, uksouth, southeastasia]
      prefix:
        description: 'Resource name prefix'
        required: true
        default: 'demo'
        type: string
      resourceGroupName:
        description: 'Resource group name (leave empty for auto-generated)'
        required: false
        type: string
      kubernetesVersion:
        description: 'Kubernetes version'
        required: true
        default: '1.29'
        type: choice
        options: ['1.29', '1.28', '1.27']
      nodeCount:
        description: 'Number of nodes in the system node pool'
        required: true
        default: '2'
        type: choice
        options: ['1', '2', '3', '4', '5']
      vmSize:
        description: 'VM size for AKS nodes'
        required: true
        default: 'Standard_B2s'
        type: choice
        options: [Standard_B2s, Standard_B4ms, Standard_D2s_v3, Standard_D4s_v3, Standard_D8s_v3]

permissions:
  id-token: write
  contents: read

env:
  PATTERN_SLUG: 'microservices-aks'
  PATTERN_DIR: 'patterns/microservices-aks'

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Build Bicep
        run: az bicep build --file ${{ env.PATTERN_DIR }}/main.bicep

  deploy:
    name: Deploy to Azure
    needs: validate
    runs-on: ubuntu-latest
    environment: azure-demo
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Set Resource Group
        id: rg
        run: |
          if [ -z "${{ inputs.resourceGroupName }}" ]; then
            echo "name=rg-${{ inputs.prefix }}-${{ env.PATTERN_SLUG }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ inputs.resourceGroupName }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ steps.rg.outputs.name }} \
            --location ${{ inputs.location }} \
            --tags owner=${{ github.actor }} workload=${{ env.PATTERN_SLUG }} environment=demo ttlHours=48
      
      - name: Deploy Pattern
        run: |
          az deployment group create \
            --resource-group ${{ steps.rg.outputs.name }} \
            --template-file ${{ env.PATTERN_DIR }}/main.bicep \
            --parameters prefix=${{ inputs.prefix }} location=${{ inputs.location }} \
            kubernetesVersion=${{ inputs.kubernetesVersion }} nodeCount=${{ inputs.nodeCount }} vmSize=${{ inputs.vmSize }} \
            --name deploy-${{ env.PATTERN_SLUG }}-$(date +%Y%m%d%H%M%S)
      
      - name: Deployment Summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pattern:** Microservices on AKS" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** \`${{ steps.rg.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** \`${{ inputs.location }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Kubernetes Version:** ${{ inputs.kubernetesVersion }}" >> $GITHUB_STEP_SUMMARY
          echo "**Node Count:** ${{ inputs.nodeCount }}" >> $GITHUB_STEP_SUMMARY
          echo "**VM Size:** ${{ inputs.vmSize }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Get AKS Credentials" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "az aks get-credentials --resource-group ${{ steps.rg.outputs.name }} --name <aks-cluster-name>" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Teardown" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "az group delete --name ${{ steps.rg.outputs.name }} --yes --no-wait" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
